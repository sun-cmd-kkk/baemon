<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BABYMONSTER • KARINA • WONYOUNG • IRENE</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0a;--text:#fff;--muted:#86868b}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;touch-action:manipulation}
  .header{position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;pointer-events:none}
  .header-label{font-size:0.7rem;font-weight:600;letter-spacing:0.1em;opacity:0.4;text-transform:uppercase}
  .header-counter{font-size:0.7rem;font-weight:500;color:var(--muted);opacity:0.5}
  .stage{position:fixed;inset:0;perspective:1200px;display:flex;align-items:center;justify-content:center}
  /* ── landscape card ── */
  .card{position:absolute;width:340px;height:200px;left:50%;top:50%;margin-left:-170px;margin-top:-100px;border-radius:16px;overflow:hidden;will-change:transform,opacity;box-shadow:0 20px 60px rgba(0,0,0,0.55);pointer-events:none}
  .card-bg{position:absolute;inset:0;background-size:cover;background-position:50% 30%;z-index:0}
  .card-gradient{position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(0,0,0,0.25) 60%,rgba(0,0,0,0.85) 100%);z-index:1}
  .card-label{position:absolute;bottom:16px;left:18px;right:18px;z-index:2;display:flex;flex-direction:column;gap:2px}
  .card-name-zh{font-size:0.65rem;font-weight:500;letter-spacing:0.06em;opacity:0.55}
  .card-name-en{font-size:1.2rem;font-weight:700;letter-spacing:-0.01em;line-height:1}
  .card-role{font-size:0.65rem;font-weight:400;opacity:0.5;letter-spacing:0.03em;margin-top:1px}
  .swipe-up-hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:3;font-size:0.6rem;letter-spacing:0.08em;opacity:0;transition:opacity 0.5s;pointer-events:none}
  .card.center-card .swipe-up-hint{opacity:0.5}
  /* ── detail ── */
  .detail-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.45s cubic-bezier(0.25,0.1,0.25,1)}
  .detail-overlay.active{opacity:1;pointer-events:auto}
  .detail-header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .detail-title{font-size:0.8rem;font-weight:600}
  .detail-close{font-size:0.7rem;opacity:0.5;letter-spacing:0.06em;cursor:pointer;padding:8px}
  .detail-carousel-wrap{flex:1;display:flex;align-items:center;justify-content:center;perspective:800px;overflow:hidden;position:relative}
  .detail-card{position:absolute;width:320px;height:190px;left:50%;top:50%;margin-left:-160px;margin-top:-95px;border-radius:14px;overflow:hidden;will-change:transform,opacity;box-shadow:0 10px 30px rgba(0,0,0,0.45)}
  .detail-card .card-bg{position:absolute;inset:0;background-size:cover;background-position:50% 30%;z-index:0}
  .detail-card .card-gradient{position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(0,0,0,0.25) 60%,rgba(0,0,0,0.85) 100%);z-index:1}
  .detail-card .card-label{bottom:14px;left:14px;right:14px}
  .detail-card .card-name-en{font-size:1.05rem}
  .detail-desc{padding:12px 20px 20px;flex-shrink:0;text-align:center}
  .detail-desc p{font-size:0.75rem;opacity:0.5;line-height:1.5}
  .detail-dots{display:flex;gap:5px;justify-content:center;margin-bottom:8px}
  .detail-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.25);transition:all 0.35s}
  .detail-dot.active{background:#fff;width:16px;border-radius:3px}
  .detail-back-hint{position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:310;font-size:0.6rem;letter-spacing:0.08em;opacity:0.3;pointer-events:none}
  .edge-fade{position:fixed;top:0;bottom:0;width:80px;z-index:50;pointer-events:none}
  .edge-fade.left{left:0;background:linear-gradient(to right,var(--bg) 0%,transparent 100%)}
  .edge-fade.right{right:0;background:linear-gradient(to left,var(--bg) 0%,transparent 100%)}
  .dots{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:100}
  .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.35s}
  .dot.active{background:#fff;width:18px;border-radius:3px}
  @media(max-width:480px){.card{width:300px;height:178px;margin-left:-150px;margin-top:-89px}.detail-card{width:280px;height:168px;margin-left:-140px;margin-top:-84px}.card-name-en{font-size:1.1rem}.detail-card .card-name-en{font-size:0.95rem}}
</style>

     {title:'SUPERNOVA',sub:'铆钉贝雷帽',desc:'240525 音乐银行Supernova舞台，贝雷帽造型火遍全网',photo:'https://img.youtube.com/vi/tXywe4zsYog/maxresdefault.jpg'},
     {title:'WHIPLASH',sub:'SMTOWN曼谷',desc:'260214 SMTOWN曼谷，短发造型+力量感舞蹈封神',photo:'https://img.youtube.com/vi/O1kyT6gQWF0/maxresdefault.jpg'},
   ]},
  {id:'wonyoung',en:'Wonyoung',zh:'张元英',role:'IVE 中心 · 全球偶像',color:'#280a14',accent:'#ff6b81',grad:'#1a060c,#280a14',
   photo:'https://img.youtube.com/vi/XmutoqP5b58/maxresdefault.jpg',
   desc:'全球现象级偶像。IZ*ONE出身，IVE中心，Miu Miu全球大使。',
   scenes:[
     {title:'LOVE DIVE',sub:'教科书表情',desc:'LOVE DIVE时期被评为教科书级表情管理的代表作',photo:'https://img.youtube.com/vi/A0vgoyTmkgQ/maxresdefault.jpg'},
     {title:'KBS 歌谣',sub:'Tell Me',desc:'241220 KBS歌谣大祝祭，复古造型+Tell Me舞台惊艳全网',photo:'https://img.youtube.com/vi/TVUOS8lkEcY/maxresdefault.jpg'},
     {title:'BLACKHOLE',sub:'暗物质甜心',desc:'260301 BLACKHOLE人气歌谣，怼脸直拍展现完美颜值',photo:'https://img.youtube.com/vi/XmutoqP5b58/maxresdefault.jpg'},
   ]},
  {id:'irene',en:'Irene',zh:'裴珠泫',role:'Red Velvet 队长 · 视觉中心 · 元祖神颜',color:'#200a1a',accent:'#ff6b9d',grad:'#140610,#200a1a',
   photo:'https://img.youtube.com/vi/mLQNGN-MeFs/maxresdefault.jpg',
   desc:'K-pop元祖神颜。Red Velvet队长，出道十年稳坐女团颜值巅峰。',
   scenes:[
     {title:'Cosmic',sub:'清纯爆发',desc:'2024 Cosmic回归，清纯造型+空灵嗓音获全网盛赞',photo:'https://img.youtube.com/vi/M_XcCzCnEM0/maxresdefault.jpg'},
     {title:'Zimzalabim',sub:'传奇直拍',desc:'190831 4K直拍，红色亮片造型至今仍是入坑神器',photo:'https://img.youtube.com/vi/mMBwXC-eJBw/maxresdefault.jpg'},
     {title:'RED FLAVOR',sub:'SMTOWN福冈',desc:'260131 SMTOWN福冈，Red Flavor经典舞台魅力依旧',photo:'https://img.youtube.com/vi/ipNINYewe1s/maxresdefault.jpg'},
   ]},
];
const TOTAL=MEMBERS.length;

const stage=document.getElementById('stage');
const dotsEl=document.getElementById('dots');
const counterEl=document.getElementById('counter');
const efL=document.getElementById('efL');
const efR=document.getElementById('efR');
const detailOverlay=document.getElementById('detailOverlay');
const detailCarousel=document.getElementById('detailCarousel');
const detailTitle=document.getElementById('detailTitle');
const detailDesc=document.getElementById('detailDesc');
const detailDots=document.getElementById('detailDots');
const detailClose=document.getElementById('detailClose');
const detailWrap=document.getElementById('detailWrap');

const cardEls=[];
MEMBERS.forEach((m,i)=>{
  const c=document.createElement('div');
  c.className='card';
  c.style.background=`linear-gradient(160deg,${m.grad})`;
  c.innerHTML=`
    <div class="card-bg" style="background-image:url(${m.photo})"></div>
    <div class="card-gradient"></div>
    <div class="card-label">
      <span class="card-name-zh">${m.zh}</span>
      <span class="card-name-en">${m.en}</span>
      <span class="card-role">${m.role}</span>
    </div>
    <div class="swipe-up-hint">↑ 上滑详情</div>`;
  stage.appendChild(c);
  cardEls.push(c);
  const d=document.createElement('div');d.className='dot';
  d.addEventListener('click',()=>animateTo(i));
  dotsEl.appendChild(d);
});
const dots=[...dotsEl.querySelectorAll('.dot')];
const detailCardEls=[];
let activeDetailIdx=0,currentDetailMember=-1;

function buildDetailCards(mi){
  detailCarousel.innerHTML='';detailCardEls.length=0;
  const m=MEMBERS[mi];detailTitle.textContent=`${m.en} · ${m.zh}`;
  m.scenes.forEach(s=>{
    const dc=document.createElement('div');
    dc.className='detail-card';
    dc.style.background=`linear-gradient(160deg,${m.color} 0%,#0a0a0a 85%)`;
    dc.innerHTML=`
      <div class="card-bg" style="background-image:url(${s.photo||m.photo})"></div>
      <div class="card-gradient"></div>
      <div class="card-label">
        <span class="card-name-zh">${s.sub}</span>
        <span class="card-name-en">${s.title}</span>
        <span class="card-role">${s.desc}</span>
      </div>`;
    detailCarousel.appendChild(dc);detailCardEls.push(dc);
  });
  detailDots.innerHTML='';
  m.scenes.forEach(()=>{const dd=document.createElement('div');dd.className='detail-dot';detailDots.appendChild(dd);});
}

// ── RENDER ──
let currentOffset=0,animFrameId=null,isAnimating=false;

function render(offset){
  currentOffset=offset;
  cardEls.forEach((c,i)=>{
    const d=i-offset,abs=Math.abs(d),sgn=Math.sign(d)||0,far=Math.max(0,abs-1);
    // landscape card: wider spacing, less rotation
    const tx=sgn*(150*(1-Math.exp(-abs*1.15)));
    const ry=sgn*abs*40;
    const tz=abs<0.5?100:abs<1.8?0:-80-far*50;
    const sc=abs<0.5?1.0:0.85-far*0.035;
    const op=abs<0.3?1:abs<2.5?1-(abs-0.3)*0.42:0;
    c.style.transform=`translateX(${tx.toFixed(1)}px) translateZ(${tz.toFixed(0)}px) rotateY(${ry.toFixed(1)}deg) scale(${sc.toFixed(3)})`;
    c.style.opacity=Math.max(0,Math.min(1,op));
    c.style.zIndex=TOTAL-Math.round(abs);
    if(abs<0.45&&!c.classList.contains('center-card'))c.classList.add('center-card');
    else if(abs>=0.45)c.classList.remove('center-card');
  });
  const n=Math.round(offset);
  dots.forEach((d,i)=>d.classList.toggle('active',i===n));
  counterEl.textContent=`${Math.min(TOTAL,Math.max(1,n+1))}/${TOTAL}`;
}

function animateTo(targetIdx){
  const target=Math.max(0,Math.min(TOTAL-1,targetIdx));
  const start=currentOffset,startTime=performance.now();
  const dist=Math.abs(target-start),dur=Math.min(500,180+dist*120);
  const ease=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
  cardEls.forEach(c=>{c.style.transition='none'});
  isAnimating=true;
  function tick(now){
    const t=Math.min(1,(now-startTime)/dur);
    render(start+(target-start)*ease(t));
    if(t<1)animFrameId=requestAnimationFrame(tick);
    else{render(target);isAnimating=false;animFrameId=null;}
  }
  if(animFrameId)cancelAnimationFrame(animFrameId);
  animFrameId=requestAnimationFrame(tick);
}

// ── UNIFIED DRAG ──
let isDragging=false,dragStartX=0,dragStartY=0,offsetAtStart=0,lastMoveX=0,lastMoveY=0,lastMoveTime=0;
let direction=null;
const velSamples=[];
const DRAG_SCALE=0.0052;

stage.addEventListener('pointerdown',e=>{
  if(detailOverlay.classList.contains('active'))return;
  if(isAnimating){if(animFrameId)cancelAnimationFrame(animFrameId);animFrameId=null;isAnimating=false;}
  isDragging=true;direction=null;
  dragStartX=e.clientX;dragStartY=e.clientY;offsetAtStart=currentOffset;
  lastMoveX=e.clientX;lastMoveY=e.clientY;lastMoveTime=performance.now();velSamples.length=0;
  cardEls.forEach(c=>{c.style.transition='none'});
  stage.setPointerCapture(e.pointerId);
});

stage.addEventListener('pointermove',e=>{
  if(!isDragging)return;
  const dx=e.clientX-dragStartX,dy=e.clientY-dragStartY;
  const absDx=Math.abs(dx),absDy=Math.abs(dy);
  if(direction===null){
    if(absDy>16&&absDy>absDx*1.0)direction='v';
    else if(absDx>10)direction='h';
  }
  if(direction==='v'){
    if(dy<-18){isDragging=false;direction=null;stage.releasePointerCapture(e.pointerId);openDetail(Math.round(currentOffset));}
    return;
  }
  if(direction===null&&absDy>absDx*1.5)return;
  const now=performance.now(),dt=Math.max(1,now-lastMoveTime);
  const mv=e.clientX-lastMoveX;velSamples.push(mv/dt);
  if(velSamples.length>6)velSamples.shift();
  let raw=offsetAtStart-dx*DRAG_SCALE;
  if(raw<-0.8)raw=-0.8+(raw+0.8)*0.2;
  if(raw>TOTAL-0.2)raw=TOTAL-0.2+(raw-(TOTAL-0.2))*0.2;
  raw=Math.max(-1.2,Math.min(TOTAL+0.2,raw));
  render(raw);
  lastMoveX=e.clientX;lastMoveY=e.clientY;lastMoveTime=now;
});

stage.addEventListener('pointerup',e=>{
  if(!isDragging)return;
  isDragging=false;stage.releasePointerCapture(e.pointerId);
  if(direction==='v'){direction=null;return;}
  const dx=e.clientX-dragStartX,absDx=Math.abs(dx);
  const avgV=velSamples.length>0?velSamples.reduce((a,b)=>a+b,0)/velSamples.length:0;
  const vb=avgV>0.1?-0.5:avgV<-0.1?0.5:0;
  let target=Math.round(currentOffset+vb);
  if(absDx>35){const dir=dx>0?-1:1;target=Math.round(offsetAtStart)+dir;}
  target=Math.max(0,Math.min(TOTAL-1,target));
  direction=null;animateTo(target);
});

// ── DETAIL ──
function openDetail(mi){
  currentDetailMember=mi;activeDetailIdx=0;
  buildDetailCards(mi);detailOverlay.classList.add('active');
  efL.style.opacity='0';efR.style.opacity='0';
  renderDetail(0,false);updateDetailUI();
}
function closeDetail(){
  detailOverlay.classList.remove('active');
  efL.style.opacity='1';efR.style.opacity='1';currentDetailMember=-1;
}
detailClose.addEventListener('click',closeDetail);

let detailOffset=0,detailDragging=false,detailStartX=0,detailOffsetStart=0,detailAnimId=null;
function renderDetail(offset,instant){
  detailOffset=offset;
  const count=detailCardEls.length;
  detailCardEls.forEach((dc,i)=>{
    const d=i-offset,abs=Math.abs(d),sgn=Math.sign(d)||0;
    const tx=sgn*(120*(1-Math.exp(-abs*1.3)));
    const sc=abs<0.5?1:0.88-abs*0.04;
    const op=abs<0.3?1:abs<1.5?1-abs*0.5:0;
    dc.style.transform=`translateX(${tx.toFixed(1)}px) scale(${sc.toFixed(3)})`;
    dc.style.opacity=Math.max(0,Math.min(1,op));
    dc.style.zIndex=count-Math.round(abs);
    dc.style.pointerEvents=abs<0.5?'auto':'none';
    dc.style.transition=instant?'none':'transform 0.35s cubic-bezier(0.25,0.1,0.25,1), opacity 0.35s cubic-bezier(0.25,0.1,0.25,1)';
  });
  updateDetailUI();
}
function updateDetailUI(){
  const idx=Math.round(detailOffset);
  detailDots.querySelectorAll('.detail-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  if(MEMBERS[currentDetailMember]){const s=MEMBERS[currentDetailMember].scenes[idx];if(s)detailDesc.textContent=s.desc;}
}
function animateDetailTo(targetIdx){
  const count=detailCardEls.length,target=Math.max(0,Math.min(count-1,targetIdx));
  const start=detailOffset,st=performance.now(),dur=Math.min(400,180+Math.abs(target-start)*120);
  const ease=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
  function tick(now){
    const t=Math.min(1,(now-st)/dur);
    renderDetail(start+(target-start)*ease(t),true);
    if(t<1)detailAnimId=requestAnimationFrame(tick);
    else{renderDetail(target,false);detailAnimId=null;activeDetailIdx=target;}
  }
  if(detailAnimId)cancelAnimationFrame(detailAnimId);
  detailAnimId=requestAnimationFrame(tick);
}
detailWrap.addEventListener('pointerdown',e=>{
  if(detailAnimId){cancelAnimationFrame(detailAnimId);detailAnimId=null;}
  detailDragging=true;detailStartX=e.clientX;detailOffsetStart=detailOffset;
  detailWrap.setPointerCapture(e.pointerId);e.stopPropagation();
});
detailWrap.addEventListener('pointermove',e=>{
  if(!detailDragging)return;
  let raw=detailOffsetStart-(e.clientX-detailStartX)*0.005;
  raw=Math.max(-1,Math.min(detailCardEls.length,raw));
  renderDetail(raw,true);
});
detailWrap.addEventListener('pointerup',e=>{
  if(!detailDragging)return;
  detailDragging=false;detailWrap.releasePointerCapture(e.pointerId);
  const dx=e.clientX-detailStartX;
  let target=Math.round(detailOffset);
  if(Math.abs(dx)>40)target=dx>0?Math.round(detailOffsetStart)-1:Math.round(detailOffsetStart)+1;
  target=Math.max(0,Math.min(detailCardEls.length-1,target));
  animateDetailTo(target);
});
let detailVertY=0;
detailWrap.addEventListener('pointerdown',e=>{detailVertY=e.clientY;},{capture:false});
detailWrap.addEventListener('pointerup',e=>{if(e.clientY-detailVertY>60&&Math.abs(detailOffset-Math.round(detailOffset))<0.2)closeDetail();});

document.addEventListener('keydown',e=>{
  if(detailOverlay.classList.contains('active')){
    if(e.key==='Escape'){closeDetail();return;}
    if(e.key==='ArrowLeft')animateDetailTo(Math.round(detailOffset)-1);
    if(e.key==='ArrowRight')animateDetailTo(Math.round(detailOffset)+1);
    return;
  }
  if(e.key==='ArrowLeft')animateTo(Math.round(currentOffset)-1);
  if(e.key==='ArrowRight')animateTo(Math.round(currentOffset)+1);
});

cardEls.forEach(c=>{c.style.transition='none'});
render(0);
</script>
